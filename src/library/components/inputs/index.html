<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Coden Agency" />
    <meta name="copyright" content="Coden Agency" />
    <meta
      name="description"
      content="A curated collection of reusable input and form components built with TailwindCSS. Browse text inputs, search bars, selects, and more."
    />

    <title>Inputs - Components Library</title>
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="../../../_ui/styles/index.css" />
    <script type="module" src="../../../_ui/components/index.js"></script>
    <script type="module" src="../../../_ui/scripts/index.js"></script>
    <script type="module" src="../header-section.js"></script>
  </head>

  <body>
    <main id="smooth-wrapper">
      <div id="smooth-content">
        <custom-header></custom-header>

        <components-header-section></components-header-section>

        <div class="flex w-full justify-center px-4">
          <h2 class="text-title-lg split-chars w-full max-w-7xl">Inputs</h2>
        </div>

        <section class="sect">
          <div class="sect-container gap-24">
            <custom-frame title="Default">
              <div class="bg-background w-full p-8 md:p-12">
                <div class="mx-auto flex w-full max-w-5xl flex-wrap items-end justify-center gap-8">
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="default-name" class="text-label text-text text-sm font-medium">Name</label>
                    <input id="default-name" type="text" placeholder="John Doe" />
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="default-email" class="text-label text-text text-sm font-medium">Email</label>
                    <input id="default-email" type="email" placeholder="john@example.com" />
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="default-password" class="text-label text-text text-sm font-medium">
                      Password
                    </label>
                    <input id="default-password" type="password" placeholder="••••••••" />
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="With helper text">
              <div class="bg-background w-full p-8 md:p-12">
                <div
                  class="mx-auto flex w-full max-w-5xl flex-wrap items-start justify-center gap-8"
                >
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="helper-email" class="text-label text-text text-sm font-medium">Email</label>
                    <input id="helper-email" type="email" placeholder="john@example.com" />
                    <p class="text-body text-text-secondary text-xs">We'll never share your email.</p>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="helper-password" class="text-label text-text text-sm font-medium">
                      Password
                    </label>
                    <input
                      id="helper-password"
                      type="password"
                      placeholder="••••••••"
                      class="border-error! focus:ring-error!"
                    />
                    <p class="text-body text-error text-xs">Password must be at least 8 characters.</p>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="helper-username" class="text-label text-text text-sm font-medium">
                      Username
                    </label>
                    <input
                      id="helper-username"
                      type="text"
                      placeholder="johndoe"
                      value="johndoe"
                      class="border-success! focus:ring-success!"
                    />
                    <p class="text-body text-success text-xs">Username is available!</p>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="With icon">
              <div class="bg-background w-full p-8 md:p-12">
                <div class="mx-auto flex w-full max-w-5xl flex-wrap items-end justify-center gap-8">
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="icon-search" class="text-label text-text text-sm font-medium">Search</label>
                    <div class="relative">
                      <svg
                        class="text-text-secondary pointer-events-none absolute top-1/2 left-3 size-4 -translate-y-1/2"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                      </svg>
                      <input
                        id="icon-search"
                        type="text"
                        placeholder="Search..."
                        class="w-full pl-10!"
                      />
                    </div>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="icon-website" class="text-label text-text text-sm font-medium">Website</label>
                    <div class="relative">
                      <svg
                        class="text-text-secondary pointer-events-none absolute top-1/2 left-3 size-4 -translate-y-1/2"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="12" cy="12" r="10" />
                        <path d="M2 12h20" />
                        <path
                          d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                        />
                      </svg>
                      <input
                        id="icon-website"
                        type="url"
                        placeholder="https://example.com"
                        class="w-full pl-10!"
                      />
                    </div>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="icon-email" class="text-label text-text text-sm font-medium">Email</label>
                    <div class="relative">
                      <svg
                        class="text-text-secondary pointer-events-none absolute top-1/2 left-3 size-4 -translate-y-1/2"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <rect width="20" height="16" x="2" y="4" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                      </svg>
                      <input
                        id="icon-email"
                        type="email"
                        placeholder="john@example.com"
                        class="w-full pl-10!"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="With addon">
              <div class="bg-background w-full p-8 md:p-12">
                <div class="mx-auto flex w-full max-w-5xl flex-wrap items-end justify-center gap-8">
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="addon-website" class="text-label text-text text-sm font-medium">Website</label>
                    <div class="flex">
                      <span
                        class="text-text-secondary bg-foreground border-accent inline-flex items-center rounded-l-md border border-r-0 px-3 text-sm font-medium"
                      >
                        https://
                      </span>
                      <input
                        id="addon-website"
                        type="text"
                        placeholder="example.com"
                        class="flex-1 rounded-l-none!"
                      />
                    </div>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="addon-price" class="text-label text-text text-sm font-medium">Price</label>
                    <div class="flex">
                      <span
                        class="text-text-secondary bg-foreground border-accent inline-flex items-center rounded-l-md border border-r-0 px-3 text-sm font-medium"
                      >
                        $
                      </span>
                      <input
                        id="addon-price"
                        type="number"
                        placeholder="0.00"
                        class="flex-1 rounded-l-none! rounded-r-none!"
                      />
                      <span
                        class="text-text-secondary bg-foreground border-accent inline-flex items-center rounded-r-md border border-l-0 px-3 text-sm font-medium"
                      >
                        USD
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="Textarea">
              <div class="bg-background w-full p-8 md:p-12">
                <div
                  class="mx-auto flex w-full max-w-5xl flex-wrap items-start justify-center gap-8"
                >
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="textarea-message" class="text-label text-text text-sm font-medium">
                      Message
                    </label>
                    <textarea
                      id="textarea-message"
                      rows="4"
                      placeholder="Write your message..."
                    ></textarea>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="textarea-bio" class="text-label text-text text-sm font-medium">Bio</label>
                    <textarea
                      id="textarea-bio"
                      rows="4"
                      placeholder="Tell us about yourself..."
                    ></textarea>
                    <p class="text-body text-text-secondary text-right text-xs">0/500</p>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="Select">
              <div class="bg-background w-full p-8 md:p-12">
                <div class="mx-auto flex w-full max-w-5xl flex-wrap items-end justify-center gap-8">
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="select-country" class="text-label text-text text-sm font-medium">
                      Country
                    </label>
                    <select
                      id="select-country"
                      class="border-accent focus:ring-primary bg-background flex min-h-10 cursor-pointer appearance-none rounded-md border p-2 transition-all duration-200 focus:ring-2 focus:outline-none"
                    >
                      <option>Select a country</option>
                      <option>United States</option>
                      <option>Brazil</option>
                      <option>United Kingdom</option>
                      <option>Japan</option>
                    </select>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <label for="select-role" class="text-label text-text text-sm font-medium">Role</label>
                    <select
                      id="select-role"
                      class="border-accent focus:ring-primary bg-background flex min-h-10 cursor-pointer appearance-none rounded-md border p-2 transition-all duration-200 focus:ring-2 focus:outline-none"
                    >
                      <option>Select a role</option>
                      <option>Developer</option>
                      <option>Designer</option>
                      <option>Manager</option>
                      <option>Analyst</option>
                    </select>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="Floating Label">
              <div class="bg-background w-full p-8 md:p-12">
                <div class="mx-auto flex w-full max-w-5xl flex-wrap items-end justify-center gap-8">
                  <div class="relative flex min-w-64 flex-1 flex-col gap-2">
                    <input
                      type="text"
                      id="floating-email"
                      class="text-text border-border focus:border-primary peer block w-full appearance-none rounded-md border bg-transparent px-2.5 pt-4 pb-2.5 text-sm focus:ring-0 focus:outline-none"
                      placeholder=" "
                    />
                    <label
                      for="floating-email"
                      class="text-label text-text-secondary bg-background peer-focus:text-primary absolute top-2 left-1.5 z-10 origin-[0] -translate-y-4 scale-75 transform cursor-text px-1 text-sm duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-75"
                    >
                      Email address
                    </label>
                  </div>
                  <div class="relative flex min-w-64 flex-1 flex-col gap-2">
                    <input
                      type="password"
                      id="floating-password"
                      class="text-text border-border focus:border-primary peer block w-full appearance-none rounded-md border bg-transparent px-2.5 pt-4 pb-2.5 text-sm focus:ring-0 focus:outline-none"
                      placeholder=" "
                    />
                    <label
                      for="floating-password"
                      class="text-label text-text-secondary bg-background peer-focus:text-primary absolute top-2 left-1.5 z-10 origin-[0] -translate-y-4 scale-75 transform cursor-text px-1 text-sm duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-75"
                    >
                      Password
                    </label>
                  </div>
                  <div class="flex min-w-64 flex-1 flex-col gap-2">
                    <div
                      class="bg-foreground border-border focus-within:border-primary relative rounded-t-md border-b-2 transition-colors"
                    >
                      <input
                        type="text"
                        id="floating-filled"
                        class="text-text peer block w-full appearance-none rounded-t-lg border-none bg-transparent px-2.5 pt-5 pb-2.5 text-sm focus:ring-0 focus:outline-none"
                        placeholder=" "
                      />
                      <label
                        for="floating-filled"
                        class="text-label text-text-secondary peer-focus:text-primary absolute start-2.5 top-4 z-10 origin-[0] -translate-y-4 scale-75 transform cursor-text text-sm duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-4 peer-focus:scale-75"
                      >
                        Filled style
                      </label>
                    </div>
                  </div>
                </div>
              </div>
            </custom-frame>
            <custom-frame title="Checkboxes & Radios">
              <div class="bg-background w-full p-8 md:p-12">
                <div
                  class="mx-auto flex w-full max-w-5xl flex-wrap items-start justify-center gap-16"
                >
                  <div class="flex min-w-48 flex-1 flex-col gap-4">
                    <p class="text-body text-text mb-2 text-sm font-bold">Checkboxes</p>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="checkbox-1"
                        type="checkbox"
                        class="text-primary bg-foreground border-border size-4 cursor-pointer rounded transition-colors focus:ring-0"
                        checked
                      />
                      <label for="checkbox-1" class="text-label text-text cursor-pointer text-sm font-medium">
                        Checked Default
                      </label>
                    </div>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="checkbox-2"
                        type="checkbox"
                        class="text-primary bg-foreground border-border size-4 cursor-pointer rounded transition-colors focus:ring-0"
                      />
                      <label for="checkbox-2" class="text-label text-text cursor-pointer text-sm font-medium">
                        Unchecked Default
                      </label>
                    </div>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="checkbox-3"
                        type="checkbox"
                        class="text-primary bg-foreground border-border size-4 cursor-not-allowed rounded opacity-50"
                        disabled
                      />
                      <label
                        for="checkbox-3"
                        class="text-label text-text-secondary cursor-not-allowed text-sm font-medium"
                      >
                        Disabled Option
                      </label>
                    </div>
                  </div>

                  <div class="flex min-w-48 flex-1 flex-col gap-4">
                    <p class="text-body text-text mb-2 text-sm font-bold">Radios</p>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="radio-1"
                        type="radio"
                        name="radio-group"
                        class="text-primary bg-foreground border-border size-4 cursor-pointer transition-colors focus:ring-0"
                        checked
                      />
                      <label for="radio-1" class="text-label text-text cursor-pointer text-sm font-medium">
                        Selected Option
                      </label>
                    </div>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="radio-2"
                        type="radio"
                        name="radio-group"
                        class="text-primary bg-foreground border-border size-4 cursor-pointer transition-colors focus:ring-0"
                      />
                      <label for="radio-2" class="text-label text-text cursor-pointer text-sm font-medium">
                        Alternative Option
                      </label>
                    </div>
                    <div class="flex min-h-11 items-center gap-3">
                      <input
                        id="radio-3"
                        type="radio"
                        name="radio-group-2"
                        class="text-primary bg-foreground border-border size-4 cursor-not-allowed opacity-50"
                        disabled
                      />
                      <label
                        for="radio-3"
                        class="text-label text-text-secondary cursor-not-allowed text-sm font-medium"
                      >
                        Disabled Option
                      </label>
                    </div>
                  </div>

                  <div class="flex min-w-48 flex-1 flex-col gap-4">
                    <p class="text-body text-text mb-2 text-sm font-bold">Toggle Switch</p>
                    <label class="text-label inline-flex min-h-11 cursor-pointer items-center">
                      <input
                        type="checkbox"
                        value=""
                        role="switch"
                        aria-label="Enabled"
                        aria-checked="true"
                        class="peer sr-only"
                        data-switch
                        checked
                      />
                      <div
                        class="bg-border peer after:border-border peer-checked:bg-primary relative h-6 w-11 rounded-full transition duration-400 after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:bg-white after:transition after:duration-400 after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"
                      ></div>
                      <span class="text-text ms-3 text-sm font-medium">Enabled</span>
                    </label>
                    <label class="text-label mt-2 inline-flex min-h-11 cursor-pointer items-center">
                      <input
                        type="checkbox"
                        value=""
                        role="switch"
                        aria-label="Disabled"
                        aria-checked="false"
                        class="peer sr-only"
                        data-switch
                      />
                      <div
                        class="bg-border peer after:border-border peer-checked:bg-primary relative h-6 w-11 rounded-full transition duration-400 after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:bg-white after:transition after:duration-400 after:content-[''] peer-checked:after:translate-x-full peer-checked:after:border-white rtl:peer-checked:after:-translate-x-full"
                      ></div>
                      <span class="text-text ms-3 text-sm font-medium">Disabled</span>
                    </label>
                  </div>
                </div>
              </div>
            </custom-frame>
          </div>
        </section>

        <custom-cta></custom-cta>

        <custom-footer></custom-footer>
      </div>
    </main>
    <script>
      const switches = document.querySelectorAll("[data-switch]");

      for (const switchInput of switches) {
        switchInput.addEventListener("change", () => {
          switchInput.setAttribute("aria-checked", String(switchInput.checked));
        });
      }
    </script>
  </body>
</html>
