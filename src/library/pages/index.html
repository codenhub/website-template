<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Coden Agency" />
    <meta name="copyright" content="Coden Agency" />
    <meta
      name="description"
      content="A curated collection of reusable pages built with TailwindCSS. Browse headers, footers, and more."
    />

    <title>Pages Library</title>
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="../../_ui/styles/index.css" />
    <script type="module" src="../../_ui/components/index.js"></script>
    <script type="module" src="../../_ui/scripts/index.js"></script>
    <script type="module" src="../../_ui/scripts/mouseTracker.js"></script>
    <script type="module" src="./header-section.js"></script>
  </head>

  <body>
    <main id="smooth-wrapper">
      <div id="smooth-content">
        <custom-header></custom-header>

        <pages-header-section></pages-header-section>

        <section class="sect py-0">
          <div class="grid w-full max-w-7xl grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
            <a href="./aetheria/index.html" class="text-label flex flex-col gap-4">
              <div class="border-border w-full overflow-hidden rounded-xl border">
                <img
                  class="aspect-3/4 w-full object-cover object-top transition-all duration-800 hover:object-bottom"
                  src="./_preview/aetheria.webp"
                  alt="Aetheria landing page preview"
                />
              </div>
              <h4 class="text-title-sm">Aetheria</h4>
              <div class="flex items-center gap-2">
                <span class="bg-accent text-accent-contrast rounded-md px-2 py-1 text-xs">
                  Landing page
                </span>
                <span class="bg-accent text-accent-contrast rounded-md px-2 py-1 text-xs">
                  Light
                </span>
              </div>
            </a>
          </div>
        </section>

        <custom-cta></custom-cta>

        <custom-footer></custom-footer>
      </div>
    </main>
  </body>
</html>
